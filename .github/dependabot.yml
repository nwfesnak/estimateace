# Automatically open PRs when npm dependencies have updates.
# Review and merge weekly so the app stays current without manual audits.
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      nextjs:
        patterns:
          - next
          - eslint-config-next
      react:
        patterns:
          - react
          - react-dom
          - '@types/react'
          - '@types/react-dom'
      supabase:
        patterns:
          - '@supabase/*'
    labels:
      - dependencies
    commit-message:
      prefix: deps